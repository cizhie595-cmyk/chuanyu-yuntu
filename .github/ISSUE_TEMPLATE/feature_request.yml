name: ✨ 功能请求
description: 建议新功能或改进
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        我们很乐意听取社区的想法！请描述您希望在川渝云图中看到的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: 这解决了什么问题？您为什么需要这个功能？
      placeholder: 我总是在...时感到困扰
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 您认为这应该如何工作？
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 您想到的任何变通方法或替代方案？
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 原型图、截图、其他工具的参考等。
    validations:
      required: false
