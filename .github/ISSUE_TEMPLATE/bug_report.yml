name: 🐛 Bug 报告
description: 报告不正常工作的问题
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间报告 Bug！请填写以下部分，以便我们能够复现并修复问题。

  - type: textarea
    id: description
    attributes:
      label: 发生了什么？
      description: 清晰描述这个 Bug。
      placeholder: 描述出了什么问题...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 我们如何复现这个问题？
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 您期望发生什么？
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 浏览器和操作系统
      description: 例如 Chrome 120, macOS 14
      placeholder: Chrome 120, macOS 14
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏
      description: 如适用，请添加截图或短视频来帮助说明问题。
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 任何可能有帮助的其他信息（控制台错误、相关 Issue 等）
    validations:
      required: false
